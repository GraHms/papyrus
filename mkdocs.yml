site_name: papyrus
site_description: A pure Go, lightning-fast PDF generation library powered by a custom HTML/CSS subset designed specifically for paged media.
site_url: https://grahms.github.io/papyrus/

theme:
  name: material
  logo: assets/papyrus-mark.svg
  favicon: assets/papyrus-mark.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

repo_name: grahms/papyrus
repo_url: https://github.com/grahms/papyrus

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - tables

nav:
  - Home: index.md
  - Specification: spec.md
  - Roadmap & Milestones: roadmap.md
