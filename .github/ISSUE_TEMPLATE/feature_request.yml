name: Feature request
description: Propose a new capability or improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Please describe the problem first, then the feature you want.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      placeholder: I need to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: Papyrus should...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds or competing approaches you considered.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Examples, documents, or prior art that help explain the request.
