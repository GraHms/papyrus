<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 320" role="img" aria-labelledby="title desc">
  <title id="title">Papyrus logo</title>
  <desc id="desc">The Papyrus wordmark paired with a Go-inspired blue icon.</desc>
  <defs>
    <linearGradient id="bg" x1="40" y1="34" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00add8"/>
      <stop offset="0.52" stop-color="#007d9c"/>
      <stop offset="1" stop-color="#00556b"/>
    </linearGradient>
    <linearGradient id="paper" x1="80" y1="66" x2="207" y2="248" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f5fdff"/>
      <stop offset="0.6" stop-color="#d8f5fb"/>
      <stop offset="1" stop-color="#a7e3f2"/>
    </linearGradient>
    <linearGradient id="fold" x1="190" y1="74" x2="220" y2="108" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#89d8ee"/>
    </linearGradient>
    <linearGradient id="accent" x1="100" y1="96" x2="100" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7ad7f0"/>
      <stop offset="1" stop-color="#00add8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#063847" flood-opacity="0.22"/>
    </filter>
  </defs>

  <g transform="translate(20 18)">
    <rect x="20" y="18" width="240" height="240" rx="68" fill="url(#bg)"/>
    <path d="M60 62c18-24 48-38 82-38 26 0 51 8 71 22" fill="none" stroke="#7fe2f5" stroke-linecap="round" stroke-width="6" opacity="0.55"/>
    <path d="M58 214c19 23 49 36 82 36 31 0 59-9 81-26" fill="none" stroke="#59c6e6" stroke-linecap="round" stroke-width="6" opacity="0.45"/>

    <g filter="url(#shadow)">
      <path d="M92 50h92c17 0 30 13 30 30v122c0 21-17 38-38 38h-72c-21 0-38-17-38-38V88c0-21 17-38 38-38Z" fill="url(#paper)"/>
      <path d="M184 50h30v30c0 16-13 29-28 29h-2Z" fill="url(#fold)"/>
      <path d="M86 79v124" fill="none" stroke="url(#accent)" stroke-linecap="round" stroke-width="13"/>

      <path d="M120 88v110" fill="none" stroke="#0f2730" stroke-linecap="round" stroke-width="18"/>
      <path d="M120 88h43c28 0 46 17 46 42s-18 42-46 42h-43" fill="none" stroke="#0f2730" stroke-linecap="round" stroke-linejoin="round" stroke-width="18"/>

      <path d="M143 165h45" fill="none" stroke="#4aa9c6" stroke-linecap="round" stroke-width="6" opacity="0.35"/>
      <path d="M143 184h33" fill="none" stroke="#4aa9c6" stroke-linecap="round" stroke-width="6" opacity="0.26"/>
    </g>
  </g>

  <g transform="translate(318 0)">
    <text x="0" y="160" fill="#0f2730" font-family="'Iowan Old Style', 'Palatino Linotype', 'Book Antiqua', Palatino, serif" font-size="116" font-weight="700" letter-spacing="1.5">papyrus</text>
    <text x="6" y="212" fill="#007d9c" font-family="'Avenir Next', 'Trebuchet MS', sans-serif" font-size="28" font-weight="700" letter-spacing="7">PURE GO PDF ENGINE</text>
    <path d="M8 244h430" fill="none" stroke="#59c6e6" stroke-linecap="round" stroke-width="8"/>
    <path d="M8 244h150" fill="none" stroke="#0f2730" stroke-linecap="round" stroke-width="8"/>
  </g>
</svg>
