<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Papyrus logo mark</title>
  <desc id="desc">A stylized sheet carrying an inked P on a rounded square in a Go-inspired blue palette.</desc>
  <defs>
    <linearGradient id="bg" x1="72" y1="68" x2="430" y2="444" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00add8"/>
      <stop offset="0.52" stop-color="#007d9c"/>
      <stop offset="1" stop-color="#00556b"/>
    </linearGradient>
    <linearGradient id="paper" x1="118" y1="103" x2="339" y2="402" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f5fdff"/>
      <stop offset="0.6" stop-color="#d8f5fb"/>
      <stop offset="1" stop-color="#a7e3f2"/>
    </linearGradient>
    <linearGradient id="fold" x1="310" y1="118" x2="356" y2="172" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#89d8ee"/>
    </linearGradient>
    <linearGradient id="accent" x1="154" y1="154" x2="154" y2="366" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7ad7f0"/>
      <stop offset="1" stop-color="#00add8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#063847" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect x="56" y="56" width="400" height="400" rx="112" fill="url(#bg)"/>
  <path d="M118 128c28-42 77-66 133-66 42 0 83 13 116 39" fill="none" stroke="#7fe2f5" stroke-linecap="round" stroke-width="10" opacity="0.55"/>
  <path d="M116 384c31 39 79 62 132 62 50 0 95-15 129-44" fill="none" stroke="#59c6e6" stroke-linecap="round" stroke-width="10" opacity="0.45"/>

  <g filter="url(#shadow)">
    <path d="M166 108h151c27 0 49 22 49 49v199c0 34-28 62-62 62H186c-34 0-62-28-62-62V170c0-34 28-62 62-62Z" fill="url(#paper)"/>
    <path d="M317 108h49v49c0 26-21 47-47 47h-2Z" fill="url(#fold)"/>
    <path d="M156 155v202" fill="none" stroke="url(#accent)" stroke-linecap="round" stroke-width="22"/>

    <path d="M212 170v180" fill="none" stroke="#0f2730" stroke-linecap="round" stroke-width="30"/>
    <path d="M212 170h70c46 0 76 27 76 68s-30 68-76 68h-70" fill="none" stroke="#0f2730" stroke-linecap="round" stroke-linejoin="round" stroke-width="30"/>

    <path d="M250 300h72" fill="none" stroke="#4aa9c6" stroke-linecap="round" stroke-width="10" opacity="0.35"/>
    <path d="M250 330h54" fill="none" stroke="#4aa9c6" stroke-linecap="round" stroke-width="10" opacity="0.26"/>
  </g>
